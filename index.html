    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #ffffff; font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        .container { text-align: center; padding: 30px 20px; }
        .logo { width: 90px; margin-bottom: 25px; animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(1.03); }
        }
        .text-main { font-weight: bold; font-size: 20px; color: #1a1a1a; margin-bottom: 8px; }
        .loader-bar {
            width: 220px; height: 6px; background: #e0e0e0;
            border-radius: 10px; margin: 18px auto; overflow: hidden; position: relative;
        }
        .progress {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #006a4e, #00a86b);
            border-radius: 10px; position: absolute;
            animation: load 1.8s ease-in-out forwards;
        }
        @keyframes load {
            0% { width: 0%; } 30% { width: 35%; }
            70% { width: 75%; } 100% { width: 100%; }
        }
        .text-sub {
            font-size: 14px; color: #006a4e; font-weight: bold;
            animation: blink 1.2s ease-in-out infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .dots::after {
            content: ''; animation: dots 1.5s steps(3, end) infinite;
        }
        @keyframes dots {
            0% { content: ''; } 33% { content: '.'; }
            66% { content: '..'; } 100% { content: '...'; }
        }
    </style>
